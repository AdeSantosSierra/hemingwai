services:
  - type: web
    name: hemingwai-backend-v1
    plan: free
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: NEW_MONGODB_URI
        sync: false
      - key: OLD_MONGODB_URI
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: CHATBOT_PASSWORD
        sync: false

  - type: web
    name: hemingwai-frontend-v1
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
